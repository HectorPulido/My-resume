server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Long-term cache for hashed Astro assets
    location ^~ /_astro/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Other static assets get a moderate cache
    location ~* \.(?:ico|png|jpg|jpeg|webp|gif|svg|woff2?|ttf|eot)$ {
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # HTML and root content: revalidate often
    location / {
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri $uri/index.html $uri/ =404;
    }

    # Sitemap and feeds
    location = /sitemap-index.xml {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location = /rss.xml {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # SPA-like fallback to the static 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
